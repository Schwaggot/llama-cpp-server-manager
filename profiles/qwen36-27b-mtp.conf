# Qwen3.6 27B (Unsloth UD-Q4_K_XL) - MTP / speculative-decoding variant
# Docs: https://unsloth.ai/docs/models/qwen3.6#mtp-guide
#
# Same base model as qwen36-27b (dense 27B, multimodal), plus Multi-Token
# Prediction for faster single-stream generation. For Qwen3.6 the MTP heads
# are embedded in a dedicated GGUF from the *-MTP-GGUF repo (no separate
# draft file), so this uses its own model download and enables
# --spec-type draft-mtp.
#
# NOTE: the MTP GGUF has the same upstream filename as the non-MTP one, so it
# is stored locally with an -MTP- suffix to avoid clobbering qwen36-27b.
#
# REQUIRES a llama-server build that supports MTP speculative decoding.
# Verify with:  llama-server --help | grep -- --spec-type

MODEL_NAME="Qwen3.6-27B-MTP"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.6-27B-MTP-UD-Q4_K_XL.gguf"

# MTP heads are embedded in the model above - no separate draft file.
MODEL_DRAFT_PATH=""

# Vision projector (multimodal support) - shared with qwen36-27b
MMPROJ_PATH="/var/lib/llama-cpp/models/Qwen3.6-27B-mmproj-BF16.gguf"

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
# Speculative decoding is single-stream oriented; keep parallel at 1.
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen instruct mode - general text tasks)
TEMP="0.7"
TOP_P="0.8"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags - thinking disabled, plus MTP speculative decoding.
# presence-penalty 1.5 is Unsloth's recommendation for Qwen3.6 instruct.
# --spec-draft-n-max: tokens drafted per step (start at 2; test 1-6).
EXTRA_FLAGS="--jinja --presence-penalty 1.5 --chat-template-kwargs '{\"enable_thinking\":false}' --spec-type draft-mtp --spec-draft-n-max 2"
