# Ministral 3 14B Reasoning (Unsloth UD-Q6_K_XL) - thinking variant
# Docs: https://unsloth.ai/docs/models/tutorials/ministral-3
# 14B dense, text-only. Q6_K_XL chosen for A40 48GB headroom.

MODEL_NAME="Ministral-3-14B-Reasoning"
MODEL_PATH="/var/lib/llama-cpp/models/Ministral-3-14B-Reasoning-2512-UD-Q6_K_XL.gguf"

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="131072"
BATCH_SIZE="8192"
UBATCH_SIZE="2048"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q8_0"
CACHE_TYPE_V="q8_0"

# Sampling (Unsloth recommended for Reasoning)
TEMP="0.7"
TOP_P="0.95"
MIN_P=""
TOP_K=""
REPEAT_PENALTY=""

# Extra flags (space-separated, added verbatim to the command)
EXTRA_FLAGS="--jinja --reasoning-format deepseek --reasoning on"
