# MiniMax M2.5 (Unsloth UD-Q3_K_XL) — 230B MoE, 10B active
# Docs: https://unsloth.ai/docs/models/minimax-m25
# Note: GGUF is split into 4 parts — point MODEL_PATH to part 1.
# Warning: 101 GB model is tight on 128 GB system. Context may need tuning.

MODEL_NAME="MiniMax-M2.5"
MODEL_PATH="/var/lib/llama-cpp/models/MiniMax-M2.5-UD-Q3_K_XL-00001-of-00004.gguf"

# No vision support
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="65536"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization (essential to fit in memory)
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (MiniMax recommended)
TEMP="1.0"
TOP_P="0.95"
MIN_P="0.01"
TOP_K="40"
REPEAT_PENALTY="1.0"

# Extra flags
EXTRA_FLAGS="--jinja --prio 3"
