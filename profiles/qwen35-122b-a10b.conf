# Qwen3.5 122B-A10B (Unsloth UD-Q4_K_XL) — 122B MoE, 10B active
# Docs: https://unsloth.ai/docs/models/qwen3.5
#
# Best for: highest quality translation (EN/DE and 200+ languages),
# nuanced summarization, professional rewriting, long-form content,
# creative writing, complex multi-turn dialogue. 201 language support
# with improved German/French/Spanish. Best text quality among models
# that fit this system.
#
# ~77 GB at Q4. Tight on 128 GB — context and parallel kept conservative.
# GGUF may be split — point MODEL_PATH to part 1.
# Supports thinking mode toggle. Disabled here for text work.

MODEL_NAME="Qwen3.5-122B-A10B"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.5-122B-A10B-UD-Q4_K_XL-00001-of-00003.gguf"

# No vision (use Qwen3.5-VL variant for vision)
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="65536"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization (important to fit in memory)
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen instruct mode — general text tasks)
TEMP="0.7"
TOP_P="0.8"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags — thinking disabled for translation/summarization work
EXTRA_FLAGS="--jinja --chat-template-kwargs '{\"enable_thinking\":false}'"
