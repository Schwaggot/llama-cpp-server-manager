# Gemma 4 26B-A4B-it (Unsloth UD-Q4_K_XL) - non-thinking variant
# Docs: https://unsloth.ai/docs/models/gemma-4
# Same model as gemma-4-26b, with reasoning/thinking disabled.

MODEL_NAME="Gemma-4-26B-A4B-it-no-think"
MODEL_PATH="/var/lib/llama-cpp/models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"

# Vision projector (multimodal support)
MMPROJ_PATH="/var/lib/llama-cpp/models/gemma-4-26B-A4B-it-mmproj-BF16.gguf"

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="2048"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Google recommended)
TEMP="1.0"
TOP_P="0.95"
MIN_P=""
TOP_K="64"
REPEAT_PENALTY=""

# Extra flags - thinking/reasoning disabled
EXTRA_FLAGS="--jinja --reasoning-format none --kv-unified"
