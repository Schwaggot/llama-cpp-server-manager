# Devstral Small 2 24B (Unsloth UD-Q4_K_XL) — 24B dense, agentic coding
# Docs: https://unsloth.ai/docs/models/tutorials/devstral-2
# Built for agentic software engineering. #1 on SWE-Bench open source.
# Note: temp 0.15 is critical per Mistral docs.

MODEL_NAME="Devstral-Small-2-24B"
MODEL_PATH="/var/lib/llama-cpp/models/Devstral-Small-2-24B-Instruct-UD-Q4_K_XL.gguf"

# No vision support in llama.cpp currently
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8080"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Mistral recommended — low temp is critical)
TEMP="0.15"
TOP_P=""
MIN_P="0.01"
TOP_K=""
REPEAT_PENALTY=""

# Extra flags
EXTRA_FLAGS="--jinja --prio 3"
