# Qwen3.5 35B-A3B (Unsloth UD-Q4_K_XL) — 35B MoE, 3B active
# Docs: https://unsloth.ai/docs/models/qwen3.5
#
# Best for: translation (EN/DE and 200+ languages), summarization, rewriting,
# creative writing, multi-turn dialogue. Outperforms Qwen3-235B on core
# benchmarks despite being much smaller. Very fast (3B active params).
# Excellent German language support. Small footprint (~22 GB) allows running
# alongside other models.
#
# Supports thinking mode toggle. Disabled here for text work.

MODEL_NAME="Qwen3.5-35B-A3B"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.5-35B-A3B-UD-Q4_K_XL.gguf"

# No vision (use Qwen3.5-VL variant for vision)
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen instruct mode — general text tasks)
TEMP="0.7"
TOP_P="0.8"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags — thinking disabled for translation/summarization work
EXTRA_FLAGS="--jinja --chat-template-kwargs '{\"enable_thinking\":false}'"
