# Qwen3.6 35B-A3B (Unsloth UD-Q4_K_XL) — thinking mode, precise coding
# Docs: https://unsloth.ai/docs/models/qwen3.6
#
# Variant of qwen36-35b-a3b tuned for precise coding tasks with thinking
# enabled. Sampling matches Unsloth's "Thinking / Precise Coding" preset
# (temp 0.6, top_p 0.95, presence_penalty 0). Reasoning traces exposed
# via the deepseek format so clients can render them.
#
# Vision disabled — coding doesn't need it. PARALLEL=1 because long
# reasoning chains contend heavily on the KV cache.
#
# For general/translation text work, use qwen36-35b-a3b instead.

MODEL_NAME="Qwen3.6-35B-A3B-think-code"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

# No vision in this profile
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8080"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen thinking mode — precise coding preset)
TEMP="0.6"
TOP_P="0.95"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags — thinking on, reasoning traces exposed via deepseek format.
# presence_penalty 0 per the precise-coding preset (omitted = default 0).
EXTRA_FLAGS="--jinja --reasoning-format deepseek --reasoning on --chat-template-kwargs '{\"enable_thinking\":true}'"
