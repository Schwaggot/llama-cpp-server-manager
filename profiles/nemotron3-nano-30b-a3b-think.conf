# Nemotron 3 Nano 30B-A3B (Unsloth UD-Q4_K_XL) — reasoning / tool-calling
# Docs: https://unsloth.ai/docs/models/nemotron-3
#
# Reasoning-enabled variant. Generates <think>…</think> traces before the
# answer. Sampling matches Unsloth's "tool-calling / reasoning" preset
# (temp 0.6, top_p 0.95). Reasoning traces exposed via deepseek format
# so clients can render them.
#
# PARALLEL=1 — long reasoning chains contend heavily on the KV cache.
# For direct answers, use nemotron3-nano-30b-a3b instead.

MODEL_NAME="Nemotron-3-Nano-30B-A3B-think"
MODEL_PATH="/var/lib/llama-cpp/models/Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf"

# No vision
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8080"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Unsloth tool-calling / reasoning preset)
TEMP="0.6"
TOP_P="0.95"
MIN_P="0.0"
TOP_K="0"
REPEAT_PENALTY="1.0"

# Extra flags — thinking on, reasoning traces exposed via deepseek format.
EXTRA_FLAGS="--jinja --reasoning-format deepseek --reasoning on --chat-template-kwargs '{\"enable_thinking\":true}'"
