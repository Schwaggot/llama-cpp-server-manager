# Gemma 4 26B-A4B-it (Unsloth UD-Q4_K_XL) - MTP / speculative-decoding variant
# Docs: https://unsloth.ai/docs/models/mtp
#
# Same base model as gemma-4-26b, plus Multi-Token Prediction for faster
# single-stream generation (~1.4-2.2x on GPU). The MTP head ships as a
# separate small GGUF (mtp-gemma-4-26B-A4B-it.gguf, ~462 MB) and is loaded
# as the draft model via MODEL_DRAFT_PATH -> --model-draft, with
# --spec-type draft-mtp selecting the MTP heads.
#
# REQUIRES a llama-server build that supports MTP speculative decoding.
# Verify with:  llama-server --help | grep -- --spec-type

MODEL_NAME="Gemma-4-26B-A4B-it-MTP"
MODEL_PATH="/var/lib/llama-cpp/models/gemma-4-26B-A4B-it-UD-Q4_K_XL.gguf"

# MTP head (separate draft GGUF)
MODEL_DRAFT_PATH="/var/lib/llama-cpp/models/mtp-gemma-4-26B-A4B-it.gguf"

# Vision projector (multimodal support)
MMPROJ_PATH="/var/lib/llama-cpp/models/gemma-4-26B-A4B-it-mmproj-BF16.gguf"

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="2048"
FLASH_ATTN="on"
THREADS="16"
# Speculative decoding is single-stream oriented; keep parallel at 1.
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Google recommended)
TEMP="1.0"
TOP_P="0.95"
MIN_P=""
TOP_K="64"
REPEAT_PENALTY=""

# Extra flags - thinking on, plus MTP speculative decoding.
# --spec-draft-n-max: tokens drafted per step (start at 2; test 1-6).
EXTRA_FLAGS="--jinja --reasoning-format deepseek --reasoning on --kv-unified --spec-type draft-mtp --spec-draft-n-max 2"
