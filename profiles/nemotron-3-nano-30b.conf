# Nemotron 3 Nano 30B-A3B (Unsloth UD-Q4_K_XL) - non-reasoning / general chat
# Docs: https://unsloth.ai/docs/models/nemotron-3
#
# 30B MoE, 3B active. Single unified model that uses <think>/</think> tokens
# for reasoning. This profile targets general chat/instruct use.
# ~22.8 GB at Q4 - fits comfortably on a 48 GB A40.

MODEL_NAME="Nemotron-3-Nano-30B-A3B"
MODEL_PATH="/var/lib/llama-cpp/models/Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf"

# No vision in this profile
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="131072"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling (Unsloth recommended for general chat)
TEMP="1.0"
TOP_P="1.0"
MIN_P="0.01"
TOP_K=""
REPEAT_PENALTY=""

EXTRA_FLAGS="--jinja"
