# Nemotron 3 Nano 30B-A3B (Unsloth UD-Q4_K_XL) - reasoning / tool-calling
# Docs: https://unsloth.ai/docs/models/nemotron-3
#
# Same model as nemotron-3-nano-30b, sampled per Unsloth's tool-calling /
# reasoning preset. Reasoning traces (<think>...</think>) exposed via the
# deepseek format so OpenAI-compatible clients can render them separately.

MODEL_NAME="Nemotron-3-Nano-30B-A3B-reasoning"
MODEL_PATH="/var/lib/llama-cpp/models/Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf"

# No vision in this profile
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="131072"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling (Unsloth recommended for tool-calling / reasoning)
TEMP="0.6"
TOP_P="0.95"
MIN_P="0.01"
TOP_K=""
REPEAT_PENALTY=""

EXTRA_FLAGS="--jinja --reasoning-format deepseek --reasoning on"
