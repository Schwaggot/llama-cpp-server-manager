# DiffusionGemma 26B-A4B-it (Unsloth Q4_K_M) - diffusion LLM variant of Gemma 4
# Docs: https://unsloth.ai/docs/models/diffusiongemma
#
# WARNING: This is a *diffusion* language model. In llama.cpp it runs via
# `llama-diffusion-cli`, NOT `llama-server`. The current serve.sh / systemd
# setup only launches llama-server, so this profile will NOT start the service
# as-is. It is provided for reference and for use with a diffusion-capable
# build. To run manually (needs a build with the diffusion example):
#   llama-diffusion-cli -m "$MODEL_PATH" -ngl 99 -cnv -n 2048
# See the diffusion-specific flags noted at the bottom of this file.

MODEL_NAME="DiffusionGemma-26B-A4B-it"
MODEL_PATH="/var/lib/llama-cpp/models/diffusiongemma-26B-A4B-it-Q4_K_M.gguf"

# No separate mmproj published for this repo
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="2048"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="1"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Google recommended, same family as gemma-4)
TEMP="1.0"
TOP_P="0.95"
MIN_P=""
TOP_K="64"
REPEAT_PENALTY=""

# Extra flags (space-separated, added verbatim to the command)
EXTRA_FLAGS="--jinja --kv-unified"

# --- Diffusion-only flags (for llama-diffusion-cli, not llama-server) ---
# -cnv                        multi-turn conversation mode
# -n 2048                     canvas / generation length
# --diffusion-visual          live denoising visualization
# --diffusion-steps <N>       number of denoising steps
