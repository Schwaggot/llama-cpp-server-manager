# Qwen3.6 27B (Unsloth UD-Q4_K_XL) — 27B dense, multimodal
# Docs: https://unsloth.ai/docs/models/qwen3.6
#
# Dense 27B sibling of the 35B-A3B MoE. Slower per token (no MoE sparsity)
# but stronger single-pass quality at the same memory footprint (~18 GB Q4).
# Vision-capable. Hybrid thinking with "preserve thinking" support.
#
# Best for: translation, summarization, rewriting, creative writing,
# multi-turn dialogue, agentic coding, tool calling — when you want
# higher quality than the A3B MoE and can spare the throughput.
#
# Supports thinking mode toggle. Disabled here for text work; use
# qwen36-27b-think-code for reasoning/coding.

MODEL_NAME="Qwen3.6-27B"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.6-27B-UD-Q4_K_XL.gguf"

# Vision projector (multimodal support)
MMPROJ_PATH="/var/lib/llama-cpp/models/Qwen3.6-27B-mmproj-BF16.gguf"

HOST="0.0.0.0"
PORT="8080"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen instruct mode — general text tasks)
TEMP="0.7"
TOP_P="0.8"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags — thinking disabled for translation/summarization work.
# presence-penalty 1.5 is Unsloth's recommendation for Qwen3.6 instruct.
EXTRA_FLAGS="--jinja --presence-penalty 1.5 --chat-template-kwargs '{\"enable_thinking\":false}'"
