# Qwen3.6 35B-A3B (Unsloth UD-Q4_K_XL) - 35B MoE, 3B active, text-only
# Docs: https://unsloth.ai/docs/models/qwen3.6
#
# Best for: translation (201 languages), summarization, rewriting,
# creative writing, multi-turn dialogue, agentic coding (developer role),
# tool calling. Hybrid thinking with new "preserve thinking" that maintains
# reasoning traces across conversations. Very fast (3B active).
# ~22 GB at Q4 - small footprint allows running alongside other models.
#
# Supports thinking mode toggle. Disabled here for text work; flip to
# enable_thinking=true (and adjust sampling) for reasoning/coding.

MODEL_NAME="Qwen3.6-35B-A3B"
MODEL_PATH="/var/lib/llama-cpp/models/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf"

# No vision in this profile
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8090"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Qwen instruct mode — general text tasks)
TEMP="0.7"
TOP_P="0.8"
MIN_P="0.0"
TOP_K="20"
REPEAT_PENALTY="1.0"

# Extra flags — thinking disabled for translation/summarization work.
# presence-penalty 1.5 is Unsloth's recommendation for Qwen3.6 instruct.
EXTRA_FLAGS="--jinja --presence-penalty 1.5 --chat-template-kwargs '{\"enable_thinking\":false}'"
