# Nemotron 3 Nano 30B-A3B (Unsloth UD-Q4_K_XL) — 30B MoE, 3B active
# Docs: https://unsloth.ai/docs/models/nemotron-3
#
# NVIDIA's hybrid reasoning MoE. 30B total, 3B active — fast like Qwen3.6
# 35B-A3B but with a different post-training mix. Strong general instruction
# following, tool calling, and reasoning. Text-only (no vision).
#
# This is the instruct (non-thinking) variant. For reasoning, use
# nemotron3-nano-30b-a3b-think.

MODEL_NAME="Nemotron-3-Nano-30B-A3B"
MODEL_PATH="/var/lib/llama-cpp/models/Nemotron-3-Nano-30B-A3B-UD-Q4_K_XL.gguf"

# No vision
MMPROJ_PATH=""

HOST="0.0.0.0"
PORT="8080"

GPU_LAYERS="auto"
CTX_SIZE="262144"
BATCH_SIZE="8192"
UBATCH_SIZE="4096"
FLASH_ATTN="on"
THREADS="16"
PARALLEL="2"

# KV cache quantization
CACHE_TYPE_K="q4_0"
CACHE_TYPE_V="q4_0"

# Sampling defaults (Unsloth general instruction preset)
TEMP="1.0"
TOP_P="1.0"
MIN_P="0.0"
TOP_K="0"
REPEAT_PENALTY="1.0"

# Extra flags — thinking disabled for direct-answer / instruction work.
EXTRA_FLAGS="--jinja --chat-template-kwargs '{\"enable_thinking\":false}'"
